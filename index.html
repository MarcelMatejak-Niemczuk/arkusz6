<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wykaz chorób</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

    <img src="zdrowia.png" alt="Życzymy zdrowia!">

    <header>
        <h1>Informacja o chorobach w Polsce</h1>
    </header>

    <nav>
        <a href="https://szpitale.pl/" target="_blank">Szpitale</a>
        <a href="https://www.przychodnie.pl/" target="_blank">Przychodnie</a>
        <a href="https://www.nfz.gov.pl/" target="_blank">NFZ</a>
    </nav>

    <main>
        <section id="lewy">
            <h2>Choroby zakaźne</h2>

            <ol>
                <li><span>Grypa</span></li>
                <li><span>Odra</span></li>
                <li><span>Ospa wietrzna</span></li>
                <li><span>COVID-19</span></li>
                <li><span>Krztusiec</span></li>
                <li><span>Różyczka</span></li>
                <li><span>Świnka</span></li>
                <li><span>Dur brzuszny</span></li>
                <li><span>Tężec</span></li>
                <li><span>Cholera</span></li>
            </ol>
        </section>

        <section id="prawy">
            <h2>Objawy chorób</h2>

            <form method="post" action="">
                <select name="choroba">
                    <option>Grypa</option>
                    <option>Odra</option>
                    <option>Ospa wietrzna</option>
                    <option>COVID-19</option>
                </select>

                <button type="submit">Sprawdź</button>
            </form>

            <div id="skrypt3">
                Wynik działania skryptu 3
            </div>
        </section>
    </main>

    <footer>
        <p>Stronę opracował: 000000009</p>
    </footer>

</body>
</html>
